# telegraf/telegraf.conf
# Subscibe a todos los topics mesh y los escribe en InfluxDB

[global_tags]
  project = "tfg_mesh"

[agent]
  interval         = "10s"
  flush_interval   = "10s"
  metric_buffer_limit = 10000

# ── Output: InfluxDB v2 ───────────────────────────────────────────────────────
[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "tfg-super-secret-token"    # mismo token que docker-compose
  organization = "tfg"
  bucket       = "mesh_metrics"

# ── Input: MQTT consumer ──────────────────────────────────────────────────────
[[inputs.mqtt_consumer]]
  servers   = ["tcp://mosquitto:1883"]
  topics    = [
    "iot/mesh/node/+/metrics",   # métricas de cada nodo
    "iot/mesh/topology",          # topología
    "iot/mesh/status",            # estado del root
  ]
  data_format = "json_v2"
  client_id   = "telegraf_tfg"
  qos         = 0

  # Extraer el MAC del nodo del topic (segmento 3)
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "iot/mesh/node/+/metrics"
    tags  = "_/_/_/node_mac/_"

  # Mapeo del JSON de métricas al esquema de InfluxDB
  [[inputs.mqtt_consumer.json_v2]]
    measurement_name = "mesh_metrics"

    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_parent"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rssi_router"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "snr_estimate"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "layer"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "hops_to_root"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "connected_subs"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "tx_count"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "rx_count"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "tx_fail"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "pdr_pct"
      type = "float"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "latency_ms"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "free_heap"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "uptime_s"
      type = "int"
    [[inputs.mqtt_consumer.json_v2.field]]
      path = "seq"
      type = "int"

    [[inputs.mqtt_consumer.json_v2.tag]]
      path = "mac"
